
services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-visionsafe360}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-visionsafe360}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7: queue payloads, durable and never evicted ────────────
  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server","--maxmemory","256mb","--maxmemory-policy","noeviction","--appendonly","yes"]
    volumes:
      - redis_queue_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Redis 7: orchestration state and rate counters ────────────────
  redis-state:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server","--maxmemory","128mb","--maxmemory-policy","noeviction","--appendonly","yes"]
    volumes:
      - redis_state_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Redis 7: realtime event streams/pubsub ────────────────────────
  redis-events:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server","--maxmemory","128mb","--maxmemory-policy","noeviction","--appendonly","yes"]
    volumes:
      - redis_events_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Redis 7: latest-frame cache, isolated from control data ───────
  redis-streaming:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server","--maxmemory","512mb","--maxmemory-policy","volatile-ttl","--save",""]
    networks:
      - internal
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── FastAPI Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      redis-state:
        condition: service_healthy
      redis-events:
        condition: service_healthy
      redis-streaming:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+pg8000://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-visionsafe360}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      REDIS_HOST: redis-state
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_QUEUE_HOST: redis-queue
      REDIS_STATE_HOST: redis-state
      REDIS_EVENTS_HOST: redis-events
      REDIS_STREAMING_HOST: redis-streaming
      SENTRY_DSN: ${SENTRY_DSN:-}
      APP_ENV: ${APP_ENV:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      LOG_JSON: "true"
    volumes:
      - ./edge_ai/vids_test:/app/edge_ai/vids_test
      - ./backend/logs:/app/backend/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 15s
      timeout: 10s
      retries: 4
      start_period: 20s

  # ── RQ Worker (Edge AI Job Orchestration) ─────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      network: host
    restart: unless-stopped
    command: python worker.py
    depends_on:
      backend:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      redis-state:
        condition: service_healthy
      redis-streaming:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+pg8000://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-visionsafe360}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      REDIS_HOST: redis-state
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_QUEUE_HOST: redis-queue
      REDIS_STATE_HOST: redis-state
      REDIS_STREAMING_HOST: redis-streaming
      APP_ENV: ${APP_ENV:-production}
      VISIONSAFE_BACKEND_URL: http://backend:8000
      MEDIAMTX_URL: rtsp://mediamtx:8554
      VISIONSAFE_WORKER_CAPACITY: ${VISIONSAFE_WORKER_CAPACITY:-1}
    volumes:
      - ./backend/app:/app/app
      - ./backend/worker.py:/app/worker.py
      - ./edge_ai:/app/edge_ai
      - ./backend/logs:/app/backend/logs
    networks:
      - internal
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Nginx + React Dashboard ───────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
# ── MediaMTX — RTSP/HLS/WebRTC relay server ───────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: visionsafe360-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8891:8888"
      - "8892:8889"
      - "8890:8890/udp" # RTSP/UDP
    networks:
      - internal
  # ── pgAdmin 4 ─────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@visionsafe.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - pgadmin_data:/var/lib/pgadmin

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  redis_queue_data:
  redis_state_data:
  redis_events_data:
