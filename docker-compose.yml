services:
	db:
		image: postgres:16-alpine
		environment:
			POSTGRES_DB: ${POSTGRES_DB:-visionsafe360}
			POSTGRES_USER: ${POSTGRES_USER:-postgres}
			POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
		volumes:
			- visionsafe_db_data:/var/lib/postgresql/data
		healthcheck:
			test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-visionsafe360}"]
			interval: 10s
			timeout: 5s
			retries: 5

	backend:
		build:
			context: ./backend
		environment:
			DATABASE_URL: ${DATABASE_URL:-postgresql+pg8000://postgres:postgres@db:5432/visionsafe360}
			SECRET_KEY: ${SECRET_KEY}
			JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
			ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
			LOG_LEVEL: ${LOG_LEVEL:-INFO}
			LOG_JSON: ${LOG_JSON:-true}
			INCIDENT_RATE_LIMIT_PER_WINDOW: ${INCIDENT_RATE_LIMIT_PER_WINDOW:-60}
			INCIDENT_RATE_LIMIT_WINDOW_SECONDS: ${INCIDENT_RATE_LIMIT_WINDOW_SECONDS:-60}
		depends_on:
			db:
				condition: service_healthy
		restart: unless-stopped

	frontend:
		build:
			context: ./dashboard
			args:
				VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
				VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
		ports:
			- "80:80"
		depends_on:
			- backend
		restart: unless-stopped

volumes:
	visionsafe_db_data:
