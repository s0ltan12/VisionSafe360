<svg viewBox="0 0 200 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vs-orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A00" />
      <stop offset="100%" stop-color="#FF8C32" />
    </linearGradient>
  </defs>

  <!-- --- Symbol Group --- -->
  <g>
    <!-- Outer dashed circle -->
    <path
      d="M100 10 A 90 90 0 1 1 100 190 A 90 90 0 1 1 100 10"
      stroke="url(#vs-orangeGradient)"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
      stroke-dasharray="100 41.3"
      opacity="0.9"
    />
    
    <!-- Inner dashed circle -->
    <path
      d="M100 22 A 78 78 0 1 1 100 178 A 78 78 0 1 1 100 22"
      stroke="#FF6A00"
      stroke-width="1.5"
      stroke-linecap="round"
      fill="none"
      stroke-dasharray="35 26.25" 
