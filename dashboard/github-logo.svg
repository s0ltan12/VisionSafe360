    />

    <!-- Eye -->
    <path
      d="M70 100 C70 100 85 85 100 85 C115 85 130 100 130 100 C130 100 115 115 100 115 C85 115 70 100 70 100 Z"
      stroke="#FF6A00"
      stroke-width="2"
      fill="none"
    />

    <!-- Eye Pupil -->
    <circle cx="100" cy="100" r="10" fill="#FF6A00" opacity="0.4" />
    <circle cx="100" cy="100" r="6" fill="#FF8C32" />
    
    <!-- Tech Details -->
    <path d="M100 35 V45" stroke="#FF6A00" stroke-width="1" />
    <path d="M100 155 V165" stroke="#FF6A00" stroke-width="1" />
  </g>

  <!-- --- Text Group --- -->
  <text 
    x="100" 
    y="235" 
    text-anchor="middle" 
    fill="#FFFFFF"
    font-size="24"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="700"
    letter-spacing="0.5"
  >
    VISIONSAFE <tspan fill="#FF6A00">360</tspan>
  </text>
