# VisionSafe 360 — Fall Detection Only Profile
# Fall detection only — no ergonomic assessment.

profile_name: fall_only
description: "Fall detection only — minimal resource usage"
person_tracker_source: ppe

modules:
  pose:
    enabled: true
    weights: ""
    schedule_every_n: 1

  hazard_analyzer:
    enabled: true
    sub_modules:
      fall:
        enabled: true
        weights: ""
        schedule_every_n: 1

  posture_analyzer:
    enabled: false
    weights: ""
    schedule_every_n: 10

  proximity_analyzer:
    enabled: false
    weights: "weights/forklift/best_forklift.pt"
    schedule_every_n: 2

  ppe_analyzer:
    enabled: true
    weights: "SH17dataset-master/yolo9e.pt"
    schedule_every_n: 2

ui:
  enable_detections:    true
  enable_pose:          true
  enable_zones:         true
  enable_hazards:       true
  enable_worker_panels: false
  enable_hud:           true
  enable_banners:       false
  overlay_scale:        1.0
  max_worker_panels:    0
  hazard_fill_critical: true
  hazard_fill_high:     true
  hazard_fill_medium:   false
  banner_critical_sec:  3.0
  banner_max:           2
  perf_budget_ms:       2.0
  auto_degrade:         true
