# VisionSafe 360 — PPE Only Profile
# PPE compliance view with SH17 detector.

profile_name: ppe_only
description: "PPE monitoring only (helmet, gloves, mask, vest, suit, shoes, etc.)"

modules:
  pose:
    enabled: true
    weights: ""
    schedule_every_n: 1

  hazard_analyzer:
    enabled: false
    sub_modules:
      fall:
        enabled: false
        weights: ""
        schedule_every_n: 1

  posture_analyzer:
    enabled: false
    weights: ""
    schedule_every_n: 10

  proximity_analyzer:
    enabled: false
    weights: "weights/forklift/best_forklift.pt"
    schedule_every_n: 2

  ppe_analyzer:
    enabled: true
    weights: "SH17dataset-master/yolo9e.pt"
    schedule_every_n: 2

ui:
  enable_detections:    true
  enable_pose:          true
  enable_zones:         false
  enable_hazards:       false
  enable_worker_panels: true
  enable_hud:           true
  enable_banners:       false
  overlay_scale:        1.0
  max_worker_panels:    6
  panel_anchor_mode:    auto_avoid_overlap
  hazard_fill_critical: false
  hazard_fill_high:     false
  hazard_fill_medium:   false
  banner_critical_sec:  2.5
  banner_max:           2
  perf_budget_ms:       2.0
  auto_degrade:         true
